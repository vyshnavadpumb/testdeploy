name: Docker Compose Deploy

on:
  push:
    branches:
      - main
      - staging

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: ${{ github.ref_name == 'main' && 'production' || 'staging' }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set Environment Variables
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "SSH_HOST=${{ secrets.SSH_HOST_PROD }}" >> $GITHUB_ENV
            echo "SSH_USER=${{ secrets.SSH_USER_PROD }}" >> $GITHUB_ENV
            echo "SSH_KEY=${{ secrets.SSH_KEY_PROD }}" >> $GITHUB_ENV
            echo "DEPLOY_PATH=${{ secrets.DEPLOY_PATH_PROD }}" >> $GITHUB_ENV
            echo "PROJECT_NAME=myapp-prod" >> $GITHUB_ENV
            echo "COMPOSE_FILE=docker-compose.yml" >> $GITHUB_ENV
          else
            echo "SSH_HOST=${{ secrets.SSH_HOST_STAGING }}" >> $GITHUB_ENV
            echo "SSH_USER=${{ secrets.SSH_USER_STAGING }}" >> $GITHUB_ENV
            echo "SSH_KEY=${{ secrets.SSH_KEY_STAGING }}" >> $GITHUB_ENV
            echo "DEPLOY_PATH=${{ secrets.DEPLOY_PATH_STAGING }}" >> $GITHUB_ENV
            echo "PROJECT_NAME=myapp-staging" >> $GITHUB_ENV
            echo "COMPOSE_FILE=docker-compose.staging.yml" >> $GITHUB_ENV
          fi

      - name: Execute Remote Deployment via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ env.SSH_HOST }}
          username: ${{ env.SSH_USER }}
          key: ${{ env.SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script: |
            # Fail immediately if any command fails
            set -e
            
            echo "--- Starting Deployment to ${{ github.ref_name }} ---"
            echo "Project: ${{ env.PROJECT_NAME }} | Path: ${{ env.DEPLOY_PATH }}"
            
            # Navigate to project directory
            cd ${{ env.DEPLOY_PATH }}
            
            # Pull latest changes
            echo "Pulling latest code from origin ${{ github.ref_name }}..."
            git fetch origin
            git checkout ${{ github.ref_name }}
            git pull origin ${{ github.ref_name }}
            
            # Docker Compose Deployment
            echo "Rebuilding and restarting containers..."
            sudo docker compose -f ${{ env.COMPOSE_FILE }} -p ${{ env.PROJECT_NAME }} down
            sudo docker compose -f ${{ env.COMPOSE_FILE }} -p ${{ env.PROJECT_NAME }} up -d --build --remove-orphans
            
            # Cleanup unused resources
            echo "Cleaning up dangling images..."
            sudo docker image prune -f
            
            echo "--- Deployment Successful ---"
